<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" sizes="32x32" href="./images/logo-2.jpg">
  <link rel="icon" type="image/jpeg" sizes="16x16" href="./images/logo-2.jpg">
  <link rel="apple-touch-icon" href="./images/logo-2.jpg">
  <title>Seun Okinbaloye</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-dark: #1a3a6b;
      --blue-mid: #2563b0;
      --blue-light: #4fa3d1;
      --white: #ffffff;
      --text-dark: #0f1e3c;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-hover: rgba(255, 255, 255, 0.95);
      --shadow: 0 4px 24px rgba(26, 58, 107, 0.13);
      --shadow-hover: 0 8px 32px rgba(26, 58, 107, 0.22);
      --radius: 14px;
    }

    html,
    body {
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
      background: linear-gradient(135deg, #dbeeff 0%, #f0f8ff 40%, #d6eaf8 100%);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .slider-wrap {
      width: 100%;
      position: relative;
      height: 340px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(26, 58, 107, 0.2);
      background: #0a1628;
    }

    .slides {
      display: flex;
      height: 100%;
      transition: transform 0.55s ease;
    }

    .slide {
      min-width: 100%;
      height: 100%;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* DOTS */
    .slider-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 10;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.42);
      cursor: pointer;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* PROFILE */
    .profile {
      display: flex;
      padding: 26px 20px 0;
      text-align: center;
      flex-direction: row;
      align-items: center;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.55rem, 6vw, 2rem);
      font-weight: 700;
    }

    .tagline {
      margin-top: 6px;
      font-size: 0.83rem;
      letter-spacing: 0.16em;
      text-transform: capitalize;
      color: var(--blue-mid);
    }

    .links {
      width: 100%;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 15px 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.97rem;
      font-weight: 500;
    }

    .footer {
      margin-top: 44px;
      font-size: 0.74rem;
      color: var(--blue-mid);
      text-align: center;
    }

    @media (max-width: 380px) {
      .slider-wrap {
        height: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- SLIDER -->
    <div class="slider-wrap">
      <div class="slides" id="slides">
        <div class="slide"><img src="./images/slide-1.jpg" style="height: 127%;"></div>
        <div class="slide"><img src="./images/maxresdefault.jpg"></div>
        <div class="slide"><img src="./images/slide-2.jpg" style="height: 125%;"></div>
        <div class="slide"><img src="./images/slide4.jpg" style="height: 125%;"></div>
        <div class="slide"><img src="./images/seun.jpg"></div>
        <div class="slide"><img src="./images/politics.jpg"></div>
      </div>

      <div class="slider-dots">
        <button class="dot active" data-i="0"></button>
        <button class="dot" data-i="1"></button>
        <button class="dot" data-i="2"></button>
        <button class="dot" data-i="3"></button>
        <button class="dot" data-i="4"></button>
        <button class="dot" data-i="5"></button>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="profile">
      <img src="./images/logo.jpeg" width="88" height="88" style="border-radius:50%; margin-bottom:16px;">
      <div>
        <h1 class="name">Seun Okinbaloye</h1>
        <p class="tagline">Multiple-Award Winning Broadcast Journalist</p>
      </div>
    </div>

    <!-- LINKS -->
    <div class="links">
      <a class="link-btn" href="https://www.youtube.com/playlist?list=PL1B7FBD8F7810907A">Watch on Channels TV</a>
      <a class="link-btn" href="https://www.youtube.com/@miconpodcast">Mic on Podcast</a>
      <a class="link-btn" href="https://seunokinbaloye.com/about/">Biography</a>
      <a class="link-btn" href="https://www.icfj.org/about/profiles/seun-okinbaloye">ICFJ Membership</a>
      <a class="link-btn"
        href="https://www.instagram.com/seun_okin?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==">Instagram</a>
      <a class="link-btn" href="https://x.com/seunokin?s=20">X (Twitter)</a>
      <a class="link-btn" href="https://www.linkedin.com/in/seun-okinbaloye-57387528/">LinkedIn</a>
      <a class="link-btn" href="https://wa.link/2xfqk9">Chat on WhatsApp</a>
    </div>

    <p class="footer">© 2026 Seun Okinbaloye</p>
  </div>

  <script>
    const track = document.getElementById('slides');
    const dots = document.querySelectorAll('.dot');
    let cur = 0;
    const TOTAL = 6;

    function goTo(n) {
      cur = (n + TOTAL) % TOTAL;
      track.style.transform = `translateX(-${cur * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === cur));
    }

    dots.forEach(d => d.onclick = () => goTo(+d.dataset.i));

    setInterval(() => goTo(cur + 1), 3000);
  </script>

</html>
